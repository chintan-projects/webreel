# Reference GitHub Actions workflow for webreel CI pipeline.
#
# Two jobs:
#   1. build-and-test: Runs on every push/PR — type-check, lint, build, unit tests
#   2. e2e: Runs on main branch only — full e2e tests with ffmpeg + optional browser
#
# Customize by copying this file to .github/workflows/ci.yml in your project.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Build
        run: pnpm build

      - name: Pipeline e2e tests (no browser)
        run: pnpm test:e2e
        env:
          E2E: "1"

      - name: Install Chrome for browser e2e
        run: npx @puppeteer/browsers install chrome@stable

      - name: Browser e2e tests
        run: pnpm test:e2e
        env:
          E2E: "1"
          E2E_BROWSER: "1"
          CHROME_PATH: chrome/linux-*/chrome-linux64/chrome

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            /tmp/webreel-*
          retention-days: 7
