# Bug Tracker — Captured via /log-bug, fixed via /fix-bug.
# Severity: critical > high > medium > low
# Status: open > investigating > fix_in_progress > resolved > wont_fix

bugs:
  - id: "BUG-001"
    severity: high
    component: "packages/webreel/src/commands/author.ts"
    status: resolved
    title: "author interactive mode hallucinates URLs, commands, and setup steps"
    reported_in: "2025-03-03"
    repro: |
      Run `webreel author` in interactive mode, enter any product name and
      local project path. The generated Demo Markdown script contains
      fabricated URLs, localhost ports, npm commands, and UI elements that
      don't correspond to the actual product.
    root_cause: |
      The LLM receives only the brief text (product name, audience, key
      messages) and the Demo Markdown format spec. The assets path is passed
      as a plain string — never scanned for README or docs. The LLM has zero
      real product context and invents everything.
    fix: |
      - Added productUrl and productContext fields to Brief interface
      - Rewrote interactive flow: asks "live URL or local directory?" first
      - Auto-reads README.md from local dirs, injects into LLM prompt
      - Added "do NOT hallucinate" instruction in prompt context section
      - Default output moved to output/ directory (gitignored)
      - Fixed director build to copy .md prompt templates to dist/
    fix_commit: "32c2bd9"

  - id: "BUG-002"
    severity: high
    component: "packages/@webreel/surfaces/src/browser.ts, terminal.ts"
    status: resolved
    title: "Render crashes with mutex error when surface action fails"
    reported_in: "2025-03-03"
    repro: |
      Render a script with an action that fails (e.g., wait_for_output timeout,
      click on non-existent element):
        webreel render script.md -o output.mp4
      Error:
        libc++abi: terminating due to uncaught exception of type
          std::__1::system_error: mutex lock failed: Invalid argument
        zsh: abort
    root_cause: |
      Race condition in surface cleanup. When an action fails, the finally
      block in SceneOrchestrator.renderScene() immediately calls
      surface.teardown(). For terminal: the PTY onData callback still fires
      during teardown, accessing this.terminal and this.asciicast with
      non-null assertions while they're being disposed/nulled. The underlying
      xterm/node-pty native code crashes with "mutex lock failed".
      For browser: CDP client.close() races with in-flight WebSocket operations.
    fix: |
      Terminal surface:
      - Store onData disposable, disconnect listener before killing PTY
      - Guard onData callback with tornDown check + optional chaining
      - Add 50ms drain delay between listener disconnect and resource disposal
      Browser surface:
      - Add 100ms drain delay before client.close() to let in-flight CDP
        operations settle

  - id: "BUG-003"
    severity: medium
    type: enhancement
    component: "packages/webreel/src/lib/scene-orchestrator.ts"
    status: open
    title: "No per-action speed control for time-compression of slow segments"
    reported_in: "session-016"
    description: |
      When a scripted action takes a long time (e.g., npm run build = 20s),
      the video plays at 1x speed creating dead air. There's no way to
      compress slow segments or expand fast ones at the action level.
      Current behavior: if narration is longer than video, last frame is
      frozen. If video is longer than narration, silence fills the gap.
      Neither case handles intentional speed changes.
    suggested_fix: |
      Add optional `speed` modifier to Demo Markdown actions:
        - action: run "npm run build"
          speed: 4x
      Implementation: frame-sampling in the assembler — keep every Nth frame
      based on speed multiplier. Does NOT require a full NLE/EDL rewrite.
      Affects: scene-parser (parse speed), orchestrator (pass through),
      video-assembler (frame sampling before encode).
    source: "Gemini architecture review — 'Time-Lapse Rule'"

  - id: "BUG-004"
    severity: low
    type: enhancement
    component: "packages/webreel/src/lib/video-assembler.ts"
    status: open
    title: "All frames held in memory — no streaming/disk option for large demos"
    reported_in: "session-016"
    description: |
      Every captured frame is stored as a Buffer[] in memory per scene.
      For a 150-frame 1080p scene this is ~90MB, acceptable for typical
      demos. But large demos (50+ scenes, 4K resolution, long recordings)
      could exhaust Node.js heap. No option to stream frames to disk
      during capture.
    suggested_fix: |
      Add --low-memory flag or auto-detect threshold. When enabled:
      1. Surface.captureFrame() writes PNG directly to temp dir instead
         of returning Buffer
      2. SceneResult.frames becomes a framePaths: string[] (file paths)
      3. Video assembler reads from disk instead of memory
      Affects: Surface interface (new captureFrameToDisk method or config),
      scene-orchestrator (conditional path), video-assembler (read from disk).
      Non-breaking: default behavior unchanged.
    source: "Gemini architecture review — disk-based frame storage"

  - id: "BUG-005"
    severity: medium
    type: enhancement
    component: "packages/@webreel/surfaces/src/desktop.ts"
    status: open
    title: "Desktop surface (nut.js) should be deferred — not promoted for v1 use"
    reported_in: "session-016"
    description: |
      The desktop surface uses nut.js for image-based OS automation.
      This is inherently flaky — Night Shift, notifications, display
      scaling, and OS theme changes all break image matching. nut.js is
      already a dynamic import (not a static dep), but the surface is
      registered by default and documented alongside browser/terminal.
      Users may attempt to use it and hit reliability issues.
    suggested_fix: |
      1. Mark desktop surface as "experimental" in docs and CLI help
      2. Add a warning log when desktop surface is used:
         "Desktop surface is experimental — browser and terminal surfaces
         are recommended for reliable recordings"
      3. Consider gating behind --experimental flag
      4. Do not promote in templates or examples until post-PMF
      Affects: default-surfaces.ts (add warning), docs, templates.
    source: "Gemini architecture review — scope down surfaces"

  - id: "BUG-006"
    severity: medium
    type: enhancement
    component: "packages/webreel/src/lib/video-assembler.ts"
    status: open
    title: "Cursor overlays not yet implemented in render pipeline"
    reported_in: "session-016"
    description: |
      The legacy `webreel record` pipeline renders cursor animation
      during capture (DOM element injected into page). The modern
      `webreel render` pipeline has no cursor overlay — captured frames
      show raw page state without any cursor indicator. This makes it
      hard for viewers to follow click/type actions in the final video.
    suggested_fix: |
      When implementing cursor overlays, apply them POST-capture as a
      compositing step (Stage 4), not during surface capture. This ensures:
      1. Cursor motion uses smooth Fitts's Law easing regardless of
         action execution speed
      2. If per-action speed modifiers are added (BUG-003), cursor speed
         stays natural even on time-compressed segments
      3. Cursor is rendered on final frames, not raw captures
      Implementation: add CursorCompositor that takes frame sequence +
      action coordinates + timing → composites cursor SVG overlay using
      sharp. Run after frame extension, before ffmpeg encode.
      Affects: new cursor-compositor.ts module, video-assembler integration.
    source: "Gemini architecture review — post-capture cursor overlay"

  - id: "BUG-007"
    severity: critical
    component: "node_modules/node-pty (pnpm install)"
    status: resolved
    title: "Terminal surface fails: posix_spawnp — spawn-helper missing execute permission"
    reported_in: "2025-03-03"
    repro: |
      Run any render with a terminal surface scene:
        webreel render script.md -o output.mp4
      Error:
        Setup failed for "terminal" surface: Failed to spawn PTY: posix_spawnp failed.
    root_cause: |
      pnpm does not preserve executable permissions on prebuilt native
      binaries. The node-pty spawn-helper binary at
      node_modules/.pnpm/node-pty@1.1.0/.../prebuilds/darwin-arm64/spawn-helper
      has permissions -rw-r--r-- (644) instead of -rwxr-xr-x (755).
      posix_spawnp cannot execute a file without the execute bit.
    fix: |
      Immediate: chmod +x on spawn-helper.
      Permanent: add postinstall script to package.json:
        "postinstall": "chmod +x node_modules/.pnpm/node-pty@*/node_modules/node-pty/prebuilds/darwin-*/spawn-helper 2>/dev/null || true"
      Will break again on every pnpm install without this.

  - id: "BUG-008"
    severity: high
    component: "packages/webreel/src/lib/scene-orchestrator.ts"
    status: resolved
    title: "No progress feedback during render — user sees nothing between start and error/success"
    reported_in: "2025-03-03"
    description: |
      When running `webreel render`, the user sees zero output between the
      initial dry-run summary and the final success/error message. The scene
      orchestrator executes all actions silently — no per-action logging, no
      scene-start indicator. If an action takes 30+ seconds (e.g., wait_for_output
      timeout), the user has no idea what's happening. Scene-complete logging
      was gated behind --verbose, which most users don't set.
    fix: |
      - Added always-on scene start log: "▶ Scene N/M: act / scene [surface]"
      - Added per-action progress: "(1/6) run "cd /path""
      - Added failure timing: "✗ failed after 30.1s"
      - Scene-complete log now always shown (was --verbose only)
      - Added formatActionLabel() helper for human-readable action summaries
      - Added formatDuration() helper for elapsed time formatting

  - id: "BUG-009"
    severity: medium
    type: enhancement
    component: "packages/webreel/src/lib/scene-orchestrator.ts"
    status: open
    title: "No way to skip or continue past a failed/timed-out action"
    reported_in: "2025-03-03"
    description: |
      When an action fails (e.g., wait_for_output timeout after 30s, click on
      non-existent element), the entire render aborts. There is no option to
      skip the failed action and continue rendering remaining actions/scenes.
      For iterative script development, this forces the user to fix every action
      sequentially — they can't see the full render with some gaps.
    suggested_fix: |
      Add --continue-on-error flag to the render command:
      - On action failure: log the error, insert a red error frame, continue
      - At end: report summary of N actions failed out of M total
      - Exit code 1 if any failures (so CI still catches them)
      Affects: scene-orchestrator (catch + continue logic), render command
      (new flag), video-assembler (error frame generation).

  - id: "BUG-010"
    severity: high
    component: "packages/webreel/src/commands/author.ts"
    status: resolved
    title: "README truncation at 4K chars cuts off setup commands — LLM hallucinated all run/build/URL info"
    reported_in: "2025-03-03"
    repro: |
      Run `webreel author` with a local project that has a large README (e.g.,
      384 lines / ~27K chars). The Quick Start, Install, and Development Commands
      sections appear after line 126. tryReadReadme() truncated at 4000 chars
      (~57 lines), so the LLM only saw the project overview and demo tables.
      Result: generated script used `npm install`, `npm start`,
      `http://localhost:8081` instead of the real commands (`pnpm install`,
      `make dev`, `http://localhost:3000`).
    root_cause: |
      tryReadReadme() had a hard 4000-char truncation with no awareness of
      document structure. For READMEs with long tables/lists before the setup
      section, the critical "how to run it" content was always cut off.
    fix: |
      - Increased README budget from 4K to 12K chars
      - Added smartTruncateReadme(): scans for setup-related headings (Quick
        Start, Install, Setup, Run, Prerequisites, Development Commands) and
        extracts those sections first
      - Extracted sections prepended as "KEY SECTIONS" so the LLM always sees
        actual commands, ports, and URLs regardless of README structure
